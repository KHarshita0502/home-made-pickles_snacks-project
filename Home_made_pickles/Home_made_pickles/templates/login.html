<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
background:#020617;
font-family:Arial;
color:white;
text-align:center;
}

.login-box{
background:#1e293b;
width:350px;
margin:auto;
margin-top:120px;
padding:30px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
background:#22c55e;
color:white;
padding:10px 20px;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#16a34a;
}

a{
color:#38bdf8;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form method="POST" autocomplete="off">

<input type="text" name="username" placeholder="Enter Username" autocomplete="off" required>

<br>

<input type="password" name="password" placeholder="Enter Password" autocomplete="new-password" required>

<br><br>

<button type="submit">Login</button>

</form>

<br>

<p>New user? <a href="/signup">Signup</a></p>

</div>

</body>
</html>
